<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lab Project | Hybrid Chatbot</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <h2><i class="fa-solid fa-robot"></i> NLP Chatbot</h2>
        </div>

        <div class="usage-stats">
            <h3>Daily Quota</h3>
            <div class="progress-bar">
                <div id="usage-bar-fill"></div>
            </div>
            <p id="usage-text">Loading stats...</p>
        </div>

        <div class="sidebar-nav">
            <button id="btn-history"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
            <button id="btn-feedback"><i class="fa-solid fa-comment-dots"></i> Feedback</button>
            <button onclick="window.location.reload()"><i class="fa-solid fa-arrows-rotate"></i> New Chat</button>
        </div>
    </div>

    <!-- MAIN CHAT AREA -->
    <div class="main-content">
        <header>
            <div class="header-info">
                <h3>Hybrid AI Assistant</h3>
                <span class="model-badge"><i class="fa-solid fa-bolt"></i>  Gemini 2.5 Flash + Local NN</span>
            </div>
        </header>

        <div id="chat-messages">
            <!-- Messages will appear here -->
            <div class="message bot-message">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">Hello! I am your advanced AI assistant. I can generate images, answer questions, and
                    solve problems. How can I help you today?</div>
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <div id="image-preview" class="hidden">
                <img id="preview-img" src="" alt="Preview">
                <button id="clear-image"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="input-container">
                <label for="image-upload" class="icon-btn" title="Upload Image">
                    <i class="fa-solid fa-image"></i>
                </label>
                <input type="file" id="image-upload" accept="image/*" style="display: none;">

                <textarea id="user-input" placeholder="Type a message..."></textarea>

                <button id="mic-btn" class="icon-btn" title="Voice Input">
                    <i class="fa-solid fa-microphone"></i>
                </button>
            </div>

            <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" class="close-modal">&times;</span>
            <h2>Chat History</h2>
            <div id="history-content" style="max-height: 300px; overflow-y: auto; margin-top: 15px;">Loading...</div>
        </div>
    </div>

    <!-- FEEDBACK MODAL -->
    <div id="feedback-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" class="close-modal">&times;</span>
            <h2>Send Feedback</h2>
            <div style="margin-top: 20px;">
                <label>Rating:</label>
                <div class="star-rating" style="font-size: 1.5rem; margin-bottom: 15px; color: #ffd700;">
                    <i class="fa-solid fa-star" data-rating="1"></i>
                    <i class="fa-solid fa-star" data-rating="2"></i>
                    <i class="fa-solid fa-star" data-rating="3"></i>
                    <i class="fa-solid fa-star" data-rating="4"></i>
                    <i class="fa-solid fa-star" data-rating="5"></i>
                </div>
                <!-- REMOVED THE DROPDOWN to match star rating logic -->

                <textarea id="feedback-comment" placeholder="Your comments..."
                    style="width: 100%; height: 100px; padding: 10px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; resize: none; font-family: inherit;"></textarea>
                <button id="submit-feedback"
                    style="width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: 600;">Submit
                    Feedback</button>
            </div>
        </div>
    </div>

    <!-- JS Logic -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
